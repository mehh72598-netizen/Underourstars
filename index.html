<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>When It Became Us</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    background-image: url("./background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Georgia, serif;
    color: #f6e6c2;
    text-align: center;
}

/* PASSWORD SCREEN */
#passwordScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0c1022;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin-top: 15px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #f6e6c2;
    color: #0c1022;
    cursor: pointer;
}

/* MAIN SCENE */
#scene {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
}

/* TOP TEXT */
#topText {
    position: absolute;
    top: 18%;
    width: 100%;
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* QUESTION */
#question {
    position: absolute;
    top: 28%;
    width: 100%;
    font-size: 30px;
    font-weight: bold;
    display: none;
}

/* CHARACTERS */
.character {
    position: absolute;
    bottom: 220px;
    width: 450px;
    transition: all 0.8s ease;
}

#girl { left: 5%; }
#boy { right: 5%; }

/* STAR BUTTONS */
.starButton {
    display: inline-block;
    margin-top: 60px;
    margin-left: 40px;
    margin-right: 40px;
    padding: 28px 40px;
    font-size: 24px;
    font-weight: bold;
    border-radius: 50%;
    background: radial-gradient(circle, #fff6c5 0%, #f6e6c2 60%, #e0c77f 100%);
    color: #0c1022;
    cursor: pointer;
    box-shadow: 0 0 30px #f6e6c2;
    transition: transform 0.3s ease;
}

.starButton:hover {
    transform: scale(1.15);
}

/* YAY EFFECT */
#yay {
    position: absolute;
    top: 45%;
    width: 100%;
    font-size: 70px;
    font-weight: bold;
    display: none;
    animation: pop 0.6s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="passwordScreen">
    <h2>something we say very often</h2>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">enter</button>
</div>

<div id="scene">

<div id="topText">
HAPPY 1096 DAYS WITH ME, POPPY
</div>

<div id="question">
ARE YOU READY TO BEGIN OUR FOURTH YEAR?
<br>
<div class="starButton" onclick="finalMessage()">YES</div>
<div class="starButton" onclick="finalMessage()">OF COURSE</div>
</div>

<div id="yay">YAY ✨</div>

<img src="girl.png" id="girl" class="character">
<img src="boy.png" id="boy" class="character">

</div>

<script>

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === "kalyanamkazhikkam") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("scene").style.display = "block";
    }
}

let clicks = 0;

document.getElementById("scene").onclick = function() {
    clicks++;

    if (clicks === 1) {
        document.getElementById("girl").style.left = "25%";
        document.getElementById("boy").style.right = "25%";
    }

    if (clicks === 2) {
        document.getElementById("girl").style.left = "35%";
        document.getElementById("boy").style.right = "35%";
    }

    if (clicks === 3) {
        document.getElementById("girl").src = "kiss.png";
        document.getElementById("boy").style.display = "none";

        document.getElementById("topText").style.display = "none";
        document.getElementById("question").style.display = "block";
    }
};

function finalMessage() {
    document.getElementById("question").style.display = "none";
    document.getElementById("yay").style.display = "block";
}

</script>

</body>
</html>
