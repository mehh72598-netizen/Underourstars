<!DOCTYPE html>
<html>
<head>
  <title>When It Became Us</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, #1c1f4a 0%, #0b0e2b 70%, #05071a 100%);
      font-family: Georgia, serif;
      color: #f3d9a3;
      cursor: pointer;
    }

    #password-screen {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0b0e2b;
      z-index: 10;
      cursor: default;
    }

    input {
      padding: 12px;
      margin-top: 15px;
      border-radius: 25px;
      border: 1px solid #f3d9a3;
      background: transparent;
      color: #f3d9a3;
      text-align: center;
    }

    button {
      margin-top: 15px;
      padding: 8px 20px;
      border-radius: 25px;
      border: 1px solid #f3d9a3;
      background: transparent;
      color: #f3d9a3;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #f3d9a3;
      color: #0b0e2b;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: none;
      text-align: center;
    }

    #moon {
      position: absolute;
      top: 80px;
      right: 150px;
      font-size: 70px;
      transition: 0.5s;
    }

    #girl, #boy {
      position: absolute;
      bottom: 100px;
      width: 180px;
      transition: 0.7s ease;
    }

    #girl { left: 5%; }
    #boy { right: 5%; }

    #starMessage {
      position: absolute;
      bottom: 15%;
      width: 100%;
      text-align: center;
      font-size: 18px;
      opacity: 0;
      transition: 0.5s;
    }

    #message {
      position: absolute;
      top: 35%;
      width: 100%;
      font-size: 32px;
      opacity: 0;
      transition: 1s;
    }

    #nextQuestion {
      margin-top: 20px;
      font-size: 22px;
      opacity: 0;
      transition: 1s;
    }

    #buttons {
      margin-top: 20px;
      opacity: 0;
      transition: 1s;
    }

    #finalPopup {
      position: absolute;
      top: 45%;
      width: 100%;
      text-align: center;
      font-size: 34px;
      opacity: 0;
      transition: 1s;
    }
  </style>
</head>

<body>

<div id="password-screen">
  <h2>Something we say very often</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
</div>

<div id="scene">

  <div id="moon">🌙</div>

  <!-- Replace these image links with your own later -->
  <img id="girl" src="https://i.imgur.com/Q9qFt3m.png">
  <img id="boy" src="https://i.imgur.com/Z8XbX8M.png">

  <div id="starMessage"></div>

  <div id="message">
    Happy 1096 days with me, Poppy 💛
    <div id="nextQuestion">Ready to write our fourth chapter?</div>
    <div id="buttons">
      <button onclick="celebrate()">Yes</button>
      <button onclick="celebrate()">Of course</button>
    </div>
  </div>

  <div id="finalPopup">Forever starting now, Poppy 💫</div>

</div>

<script>

const correctPassword = "kalyanamkazhikkam";

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  if (input === correctPassword) {
    document.getElementById("password-screen").style.display = "none";
    document.getElementById("scene").style.display = "block";
  } else {
    alert("That’s not it.");
  }
}

let step = 0;
let girl = document.getElementById("girl");
let boy = document.getElementById("boy");
let moon = document.getElementById("moon");
let message = document.getElementById("message");
let starMessage = document.getElementById("starMessage");

const starMessages = [
  "I love you, Poppy.",
  "You are the best.",
  "I am so proud of you.",
  "Thank you for choosing me.",
  "Happy anniversary at last.",
  "Still stuck with me.",
  "You make everything better."
];

document.body.addEventListener("click", function() {

  if(document.getElementById("scene").style.display === "block"){

    if(step < 5){
      step++;
      girl.style.left = (5 + step * 10) + "%";
      boy.style.right = (5 + step * 10) + "%";

      starMessage.innerText = starMessages[Math.floor(Math.random() * starMessages.length)];
      starMessage.style.opacity = 1;

      setTimeout(() => {
        starMessage.style.opacity = 0;
      }, 2000);
    }

    if(step === 5){
      girl.src = "https://i.imgur.com/W5b8KXK.png";
      boy.style.display = "none";
      moon.innerHTML = "🌙😊";
      message.style.opacity = 1;

      setTimeout(() => {
        document.getElementById("nextQuestion").style.opacity = 1;
        document.getElementById("buttons").style.opacity = 1;
      }, 2000);
    }
  }

});

function celebrate(){
  document.getElementById("finalPopup").style.opacity = 1;

  for(let i=0;i<30;i++){
    let spark = document.createElement("div");
    spark.innerHTML = "✨";
    spark.style.position = "absolute";
    spark.style.left = Math.random()*100 + "%";
    spark.style.top = Math.random()*100 + "%";
    spark.style.fontSize = "20px";
    spark.style.opacity = 1;
    spark.style.transition = "2s";
    document.body.appendChild(spark);

    setTimeout(()=>{ spark.style.opacity = 0; },100);
    setTimeout(()=>{ spark.remove(); },2000);
  }
}

</script>

</body>
</html>
