<!DOCTYPE html>
<html>
<head>
  <title>When It Became Us</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: serif;
      overflow: hidden;
    }

    #password-screen {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
    }

    #main-content {
      display: none;
      text-align: center;
      position: relative;
      z-index: 2;
      top: 40%;
    }

    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      background: black;
      color: white;
      border: 1px solid white;
    }

    .message {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 20px;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

<body>

<div id="password-screen">
  <h2>Enter Password</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
</div>

<canvas id="stars"></canvas>

<div id="main-content">
  <h1>When It Became Us</h1>
  <p>A Love Story</p>
</div>

<script>
const correctPassword = "hima";

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  if (input === correctPassword) {
    document.getElementById("password-screen").style.display = "none";
    document.getElementById("main-content").style.display = "block";
    startStars();
  } else {
    alert("Wrong password.");
  }
}

function startStars() {
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let stars = [];
  const messages = [
    "You were always my favorite what if.",
    "That night still feels unreal.",
    "I would still choose you.",
    "Somewhere between the stars, we became us.",
    "Thank you for choosing me."
  ];

  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 2,
      clickable: Math.random() < 0.08
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(star => {
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  canvas.addEventListener("click", function(event) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = event.clientX - rect.left;
    const mouseY = event.clientY - rect.top;

    stars.forEach(star => {
      const distance = Math.sqrt(
        (mouseX - star.x) ** 2 + (mouseY - star.y) ** 2
      );

      if (distance < 5 && star.clickable) {
        showMessage(messages[Math.floor(Math.random() * messages.length)]);
      }
    });
  });

  drawStars();
}

function showMessage(text) {
  const messageBox = document.createElement("div");
  messageBox.className = "message";
  messageBox.innerText = text;

  document.body.appendChild(messageBox);

  setTimeout(() => {
    messageBox.remove();
  }, 4000);
}
</script>

</body>
</html>
