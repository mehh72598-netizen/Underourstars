<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>When It Became Us</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-image: url("./background.PNG");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Georgia, serif;
    color: #f6e6c2;
    text-align: center;
    overflow: hidden;
}

/* PASSWORD SCREEN */
#passwordScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0c1022;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin-top: 15px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #f6e6c2;
    color: #0c1022;
    cursor: pointer;
}

/* MAIN SCENE */
#scene {
    display: none;
    height: 100vh;
    position: relative;
}

/* TOP TEXT */
#topText {
    position: absolute;
    top: 12%;
    width: 100%;
    font-size: 50px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* QUESTION */
#question {
    position: absolute;
    top: 28%;
    width: 100%;
    font-size: 34px;
    font-weight: bold;
    display: none;
}

/* BUTTONS */
.starButton {
    display: inline-block;
    margin: 80px 60px 0 60px;
    padding: 30px 55px;
    font-size: 26px;
    font-weight: bold;
    border-radius: 50%;
    background: radial-gradient(circle, #fff6c5 0%, #f6e6c2 60%, #e0c77f 100%);
    color: #0c1022;
    cursor: pointer;
    box-shadow: 0 0 40px #f6e6c2;
    transition: transform 0.3s ease;
}

.starButton:hover {
    transform: scale(1.15);
}

/* YAY EFFECT */
#yay {
    position: absolute;
    top: 40%;
    width: 100%;
    font-size: 90px;
    font-weight: bold;
    display: none;
    animation: pop 0.6s ease forwards;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* BOTTOM CONTAINER */
#bottomContainer {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
}

/* CHARACTERS */
.character {
    width: 800px;
    transition: transform 0.8s ease;
}

#girl {
    transform: translateX(-120%);
}

#boy {
    transform: translateX(0%);
}
</style>
</head>

<body>

<div id="passwordScreen">
    <h2>something we say very often</h2>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">enter</button>
</div>

<div id="scene">

<div id="topText">
HAPPY 1096 DAYS WITH ME, POPPY
</div>

<div id="question">
ARE YOU READY TO BEGIN OUR FOURTH YEAR?
<br>
<div class="starButton" onclick="finalMessage()">YES</div>
<div class="starButton" onclick="finalMessage()">OF COURSE</div>
</div>

<div id="yay">YAAAAAAAAY!!! I LOVE YOUU<3 ✨</div>

<div id="bottomContainer">
    <img src="girl.png" id="girl" class="character">
    <img src="boy.png" id="boy" class="character">
</div>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3.mpeg" type="audio/mpeg">
</audio>

<script>

function checkPassword() {
    const input = document.getElementById("passwordInput").value;

    if (input === "kalyanamkazhikkam") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("scene").style.display = "block";

        const music = document.getElementById("bgMusic");
        music.volume = 0;
        music.play();

        // Slow echo fade-in
        let fadeIn = setInterval(function() {
            if (music.volume < 0.35) {
                music.volume += 0.005;
            } else {
                clearInterval(fadeIn);
            }
        }, 200);
    }
}

let clicks = 0;

document.getElementById("scene").onclick = function() {
    clicks++;

    if (clicks === 1) {
        document.getElementById("girl").style.transform = "translateX(-90%)";
    }

    if (clicks === 2) {
        document.getElementById("girl").style.transform = "translateX(-60%)";
    }

    if (clicks === 3) {

        document.getElementById("girl").src = "kiss.png";
        document.getElementById("boy").style.display = "none";

        const music = document.getElementById("bgMusic");

        // Dramatic swell at kiss
        let swell = setInterval(function() {
            if (music.volume < 0.75) {
                music.volume += 0.01;
            } else {
                clearInterval(swell);
            }
        }, 120);

        document.getElementById("topText").style.display = "none";
        document.getElementById("question").style.display = "block";
    }
};

function finalMessage() {
    document.getElementById("question").style.display = "none";
    document.getElementById("yay").style.display = "block";
}

</script>

</body>
</html>
