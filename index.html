<!DOCTYPE html>
<html>
<head>
  <title>When It Became Us</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1c1f4a 0%, #0b0e2b 60%, #05071a 100%);
      color: #f8e7c9;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    #password-screen {
      position: absolute;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: transparent;
      z-index: 3;
      text-align: center;
    }

    #password-screen h2 {
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 20px;
      color: #f3d9a3;
    }

    input {
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #f3d9a3;
      color: #f8e7c9;
      font-size: 16px;
      text-align: center;
      border-radius: 25px;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      background: transparent;
      border: 1px solid #f3d9a3;
      color: #f3d9a3;
      cursor: pointer;
      border-radius: 25px;
      transition: 0.3s ease;
    }

    button:hover {
      background: #f3d9a3;
      color: #0b0e2b;
    }

    #main-content {
      display: none;
      position: relative;
      z-index: 2;
      text-align: center;
      top: 35%;
    }

    #main-content h1 {
      font-size: 48px;
      margin-bottom: 10px;
      color: #f3d9a3;
      letter-spacing: 3px;
    }

    #main-content p {
      font-size: 20px;
      font-style: italic;
      color: #f8e7c9;
      opacity: 0.85;
    }

    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .message {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 12, 40, 0.8);
      padding: 20px 30px;
      border-radius: 30px;
      font-size: 16px;
      color: #f3d9a3;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>

<body>

<div id="password-screen">
  <h2>Something we say very often</h2>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
</div>

<canvas id="stars"></canvas>

<div id="main-content">
  <h1>When It Became Us</h1>
  <p>A Love Story</p>
</div>

<script>

const correctPassword = "kalyamkazhikkam";

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  if (input === correctPassword) {
    document.getElementById("password-screen").style.display = "none";
    document.getElementById("main-content").style.display = "block";
    startStars();
  } else {
    alert("That’s not it.");
  }
}

function startStars() {
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let stars = [];
  const messages = [
    "The universe approved.",
    "Even the moon smiled.",
    "That night still glows.",
    "We were written in starlight.",
    "It was always you."
  ];

  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 2.2,
      glow: Math.random() * 0.5 + 0.5,
      clickable: Math.random() < 0.07
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 223, 150," + star.glow + ")";
      ctx.shadowBlur = 8;
      ctx.shadowColor = "#ffd27f";
      ctx.fill();
    });

    requestAnimationFrame(drawStars);
  }

  canvas.addEventListener("click", function(event) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = event.clientX - rect.left;
    const mouseY = event.clientY - rect.top;

    stars.forEach(star => {
      const distance = Math.sqrt(
        (mouseX - star.x) ** 2 +
        (mouseY - star.y) ** 2
      );

      if (distance < 8 && star.clickable) {
        showMessage(messages[Math.floor(Math.random() * messages.length)]);
      }
    });
  });

  drawStars();
}

function showMessage(text) {
  const messageBox = document.createElement("div");
  messageBox.className = "message";
  messageBox.innerText = text;

  document.body.appendChild(messageBox);

  setTimeout(() => {
    messageBox.remove();
  }, 4000);
}

</script>

</body>
</html>
