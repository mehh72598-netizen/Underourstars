<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>When It Became Us</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #1b1f3b 0%, #0c1022 100%);
    font-family: 'Georgia', serif;
    color: #f6e6c2;
    text-align: center;
}

#passwordScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #0c1022;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin-top: 15px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #f6e6c2;
    color: #0c1022;
    cursor: pointer;
}

#scene {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
}

.character {
    position: absolute;
    bottom: 80px;
    width: 300px;
    transition: all 0.8s ease;
}

#girl {
    left: 5%;
}

#boy {
    right: 5%;
}

#moon {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 100px;
    transition: transform 1s ease;
}

#message {
    position: absolute;
    bottom: 40px;
    width: 100%;
    font-size: 26px;
    opacity: 0;
    transition: opacity 2s ease;
}

.star {
    position: absolute;
    background: #f6e6c2;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<div id="passwordScreen">
    <h2>something we say very often</h2>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">enter</button>
</div>

<div id="scene">

<div id="moon">🌕</div>

<img src="girl.png" id="girl" class="character">
<img src="boy.png" id="boy" class="character">

<div id="message">
Happy 1096 days with me, Poppy. 🌙
</div>

</div>

<script>
function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === "kalyanamkazhikkam") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("scene").style.display = "block";
    }
}

let clicks = 0;

document.getElementById("scene").onclick = function() {
    clicks++;

    if (clicks === 1) {
        document.getElementById("girl").style.left = "20%";
        document.getElementById("boy").style.right = "20%";
    }

    if (clicks === 2) {
        document.getElementById("girl").style.left = "30%";
        document.getElementById("boy").style.right = "30%";
    }

    if (clicks === 3) {
        document.getElementById("girl").style.left = "40%";
        document.getElementById("boy").style.right = "40%";
    }

    if (clicks === 4) {
        document.getElementById("girl").src = "kiss.png";
        document.getElementById("boy").style.display = "none";
        document.getElementById("moon").innerHTML = "😊🌕";
        document.getElementById("message").style.opacity = "1";
    }
};

// Create stars
for (let i = 0; i < 150; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.animationDuration = (Math.random() * 2 + 1) + "s";
    document.body.appendChild(star);
}
</script>

</body>
</html>
