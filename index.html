<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>When It Became Us</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: url("background.png") no-repeat center center fixed;
    background-size: cover;
    font-family: Georgia, serif;
    color: #f6e6c2;
    text-align: center;
}

/* PASSWORD SCREEN */
#passwordScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #0c1022;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin-top: 15px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #f6e6c2;
    color: #0c1022;
    cursor: pointer;
}

/* MAIN SCENE */
#scene {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
}

/* CHARACTERS */
.character {
    position: absolute;
    bottom: 80px;
    width: 300px;
    transition: all 0.8s ease;
}

#girl {
    left: 5%;
}

#boy {
    right: 5%;
}

/* MESSAGE AREA */
#message {
    position: absolute;
    bottom: 60px;
    width: 100%;
    font-size: 26px;
    opacity: 0;
    transition: opacity 2s ease;
}

/* STAR BUTTONS */
.starButton {
    display: inline-block;
    margin: 15px 25px;
    padding: 25px 35px;
    font-size: 22px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff6c5 0%, #f6e6c2 60%, #e0c77f 100%);
    color: #0c1022;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 25px #f6e6c2;
}

.starButton:hover {
    transform: scale(1.15);
    box-shadow: 0 0 40px #fff6c5;
}
</style>
</head>

<body>

<div id="passwordScreen">
    <h2>something we say very often</h2>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">enter</button>
</div>

<div id="scene">

<img src="girl.png" id="girl" class="character">
<img src="boy.png" id="boy" class="character">

<div id="message">

    <div id="daysText">
        Happy 1096 days with me, Poppy.
    </div>

    <div id="starChoices" style="display:none; margin-top:30px;">
        <div class="starButton" onclick="fourthYear()">Yes</div>
        <div class="starButton" onclick="fourthYear()">Of course</div>
    </div>

    <div id="finalPopup" style="display:none; margin-top:30px; font-size:24px;">
        Then let us begin our fourth year together.
    </div>

</div>

</div>

<script>

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === "kalyanamkazhikkam") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("scene").style.display = "block";
    }
}

let clicks = 0;

document.getElementById("scene").onclick = function() {
    clicks++;

    if (clicks === 1) {
        document.getElementById("girl").style.left = "20%";
        document.getElementById("boy").style.right = "20%";
    }

    if (clicks === 2) {
        document.getElementById("girl").style.left = "30%";
        document.getElementById("boy").style.right = "30%";
    }

    if (clicks === 3) {
        document.getElementById("girl").style.left = "40%";
        document.getElementById("boy").style.right = "40%";
    }

    if (clicks === 4) {
        document.getElementById("girl").src = "kiss.png";
        document.getElementById("boy").style.display = "none";
        document.getElementById("message").style.opacity = "1";

        setTimeout(function() {
            document.getElementById("daysText").style.display = "none";
            document.getElementById("starChoices").style.display = "block";
        }, 3000);
    }
};

function fourthYear() {
    document.getElementById("starChoices").style.display = "none";
    document.getElementById("finalPopup").style.display = "block";
}

</script>

</body>
</html>
